name: Deploy to VPS

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'infra/**'
      - 'screenshots/**'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  DEPLOY_PATH_PROD: ${{ secrets.DEPLOY_PATH_PROD }}
  DEPLOY_PATH_TEST: ${{ secrets.DEPLOY_PATH_TEST }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'test' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH_PROD: ${{ env.DEPLOY_PATH_PROD }}
          DEPLOY_PATH_TEST: ${{ env.DEPLOY_PATH_TEST }}
          REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_PATH_PROD,DEPLOY_PATH_TEST,REF_NAME
          script: |
            set -eu

            case "$REF_NAME" in
              main)
                DEPLOY_ENV="production"
                DEPLOY_PATH="$DEPLOY_PATH_PROD"
                APP_IMAGE="astro-stack"
                AUTH_IMAGE="astro-stack-auth"
                APP_CONTAINER_NAME="astro-stack-app"
                AUTH_CONTAINER_NAME="astro-stack-auth"
                APP_SERVICE="app"
                AUTH_SERVICE="auth-gateway"
                ;;
              develop)
                DEPLOY_ENV="test"
                DEPLOY_PATH="$DEPLOY_PATH_TEST"
                APP_IMAGE="astro-stack-test"
                AUTH_IMAGE="astro-stack-test-auth"
                APP_CONTAINER_NAME="astro-stack-test-app"
                AUTH_CONTAINER_NAME="astro-stack-test-auth"
                APP_SERVICE="app"
                AUTH_SERVICE="auth-gateway"
                ;;
              *)
                echo "Unsupported deploy branch: $REF_NAME"
                exit 1
                ;;
            esac

            cd "$DEPLOY_PATH"
            echo "Deploying $REF_NAME to $DEPLOY_ENV at $DEPLOY_PATH"

            # 1. Git maintenance
            git -c safe.directory="$DEPLOY_PATH" fetch origin "$REF_NAME:refs/remotes/origin/$REF_NAME"
            git -c safe.directory="$DEPLOY_PATH" reset --hard "origin/$REF_NAME"

            # .env is owned by the VPS and intentionally stays outside git.
            test -f .env || { echo "Missing .env in $DEPLOY_PATH"; exit 1; }

            # Resolve auth gateway URL from .env for Decap CMS config
            AUTH_GATEWAY_URL="$(awk -F= '/^AUTH_GATEWAY_URL=/{sub(/^[^=]*=/, "", $0); print $0; exit}' .env | tr -d '\r')"
            if [ -z "$AUTH_GATEWAY_URL" ]; then
              echo "AUTH_GATEWAY_URL not set in .env"
              exit 1
            fi
            sed -i "s|__AUTH_GATEWAY_URL__|$AUTH_GATEWAY_URL|g" public/admin/config.yml

            # 2. Network safety
            docker network inspect web-public >/dev/null 2>&1 || docker network create web-public

            # 3. Rolling tag strategy for app/auth images
            if docker image inspect "$APP_IMAGE:latest" >/dev/null 2>&1; then
              docker image tag "$APP_IMAGE:latest" "$APP_IMAGE:previous"
            fi
            if docker image inspect "$AUTH_IMAGE:latest" >/dev/null 2>&1; then
              docker image tag "$AUTH_IMAGE:latest" "$AUTH_IMAGE:previous"
            fi

            # 4. Build & deploy
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            export APP_IMAGE
            export AUTH_IMAGE
            export APP_CONTAINER_NAME
            export AUTH_CONTAINER_NAME
            docker compose --progress=plain build "$APP_SERVICE" "$AUTH_SERVICE"

            docker compose up -d --remove-orphans --force-recreate "$APP_SERVICE" "$AUTH_SERVICE"

            # 5. Cleanup dangling layers while preserving latest/previous tags
            docker image prune -f
